<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- IDE skin: Pin5 -->
  <!-- Editor background (dark panel) -->
  <rect x="0" y="0" width="300" height="400" rx="8" fill="#2D2D30"/>
  <!-- Activity bar strip (chrome signal) -->
  <rect x="0" y="0" width="10" height="400" rx="8" fill="#333333"/>
  <rect x="6" y="0" width="4" height="400" fill="#333333"/>
  <!-- Tab bar -->
  <rect x="10" y="0" width="290" height="26" rx="0" fill="#333333"/>
  <rect x="10" y="0" width="290" height="4" rx="0" fill="#333333"/>
  <!-- Active tab -->
  <rect x="12" y="2" width="120" height="24" rx="4" fill="#2D2D30"/>
  <!-- Tab dot (syntax-color — modified file indicator) -->
  <circle cx="127" cy="13" r="3" fill="#569CD6"/>
  <text x="72" y="13" font-family="Consolas,'Courier New',monospace" font-size="11"
    fill="#D4D4D4" text-anchor="middle" dominant-baseline="middle">Pin5.ts</text>
  <!-- Tab separator -->
  <line x1="10" y1="26" x2="300" y2="26" stroke="#3E3E42" stroke-width="1"/>
  <!-- HERO: large rank/honor glyph, syntax-colored -->
  <text x="155" y="206" font-family="Consolas,'Courier New',monospace" font-size="200" font-weight="bold"
    fill="#569CD6" text-anchor="middle" dominant-baseline="middle"
    letter-spacing="-8">5</text>
  
  <!-- Type label below digit (small syntax token) -->
  <text x="155" y="370" font-family="Consolas,'Courier New',monospace" font-size="22"
    fill="#569CD6" opacity="0.50" text-anchor="middle" dominant-baseline="middle">pin</text>
  <!-- Status bar at bottom -->
  <rect x="0" y="386" width="300" height="14" rx="8" fill="#252526"/>
  <rect x="0" y="386" width="300" height="7" fill="#252526"/>
  <text x="16" y="393" font-family="Arial,Helvetica,sans-serif" font-size="8"
    fill="#858585" dominant-baseline="middle">TypeScript</text>
  <!-- Outer border -->
  <rect x="0.75" y="0.75" width="298.5" height="398.5" rx="7.5" fill="none" stroke="#3E3E42" stroke-width="1.5"/>
</svg>